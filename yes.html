<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 2.3rem;
      white-space: normal;
    }

    .glow {
      animation: glow 2s infinite alternate, beat 1s infinite;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px pink; }
      to { text-shadow: 0 0 40px red; }
    }

    @keyframes beat {
      50% { transform: scale(1.05); }
    }
  </style>
</head>

<body>

<h1 id="msg">Listen... 💖</h1>

<audio id="song1">
  <source src="dekhta.mp3" type="audio/mpeg">
</audio>

<audio id="song2">
  <source src="inkem.mp3" type="audio/mpeg">
</audio>

<script>
const msg = document.getElementById("msg");
const text = "Shree... nenu ninu premisthinnanu na tikkoda 💖";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    msg.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 80);
  } else {
    msg.classList.add("glow");
  }
}

const song1 = document.getElementById("song1");
const song2 = document.getElementById("song2");

// ✅ Play songs after page loads using user interaction from YES click
window.onload = () => {
  song1.currentTime = 20;
  song1.play().catch(() => {});

  setTimeout(() => {
    song1.pause();

    song2.currentTime = 40;
    song2.play().catch(() => {});

    setTimeout(typeWriter, 500);

  }, 5000);
};
</script>

</body>
</html>
