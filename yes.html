<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="yes-page">

<h1 id="msg">Listen... 💖</h1>

<audio id="song1">
  <source src="dekhta.mp3" type="audio/mpeg">
</audio>

<audio id="song2">
  <source src="inkem.mp3" type="audio/mpeg">
</audio>

<script>
const msg = document.getElementById("msg");
const text = "Shree... nenu ninu premisthinnanu na tikkoda 💖";

let i = 0;

function typeWriter() {
  if (i < text.length) {
    msg.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 80);
  } else {
    msg.classList.add("final-glow");
    createHeartsBurst();
  }
}

const song1 = document.getElementById("song1");
const song2 = document.getElementById("song2");

// ✅ start after user click (guaranteed audio)
document.body.addEventListener("click", () => {

  song1.currentTime = 20;
  song1.play().catch(()=>{});

  setTimeout(() => {
    song1.pause();

    song2.currentTime = 40;
    song2.play().catch(()=>{});

    msg.innerHTML = "";
    typeWriter();

  }, 5000);

}, { once: true });

// 💥 heart burst
function createHeartsBurst() {
  for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.innerText = "💖";
    heart.classList.add("burst");

    heart.style.left = "50%";
    heart.style.top = "50%";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 200;

    heart.style.setProperty("--x", Math.cos(angle) * distance + "px");
    heart.style.setProperty("--y", Math.sin(angle) * distance + "px");

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1500);
  }
}
</script>

</body>
</html>
